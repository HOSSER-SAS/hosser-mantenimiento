// Firebase Realtime DB helpers
function dbRef(uid, col) {
  return fbDb.ref("users/" + uid + "/" + col);
}
async function dbSet(uid, col, id, data) {
  try {
    await dbRef(uid, col).child(String(id)).set(data);
  } catch (e) {
    console.warn("dbSet", e);
  }
}
async function dbRemove(uid, col, id) {
  try {
    await dbRef(uid, col).child(String(id)).remove();
  } catch (e) {
    console.warn("dbRemove", e);
  }
}
function dbListen(uid, col, setState, lsKey) {
  const ref = dbRef(uid, col);
  ref.on("value", snap => {
    const val = snap.val();
    const arr = val ? Object.values(val).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)) : [];
    setState(arr);
    LS.save(lsKey, arr);
  }, err => console.warn("dbListen", err));
  return () => ref.off("value");
}

    const img = new Image();

      let w = img.width,
        h = img.height;
      if (w > maxPx || h > maxPx) {
        if (w > h) {
          h = Math.round(h * (maxPx / w));
          w = maxPx;
        } else {
          w = Math.round(w * (maxPx / h));
          h = maxPx;
        }

      canvas.height = h;

  });
}

    function checkPage(needed) {
      if (y + needed > 275) {
        doc.addPage();
        doc.setFillColor(255, 255, 255);
        doc.rect(0, 0, W, 297, "F");
        y = 14;
      }
    }
    function secBar(title, r, g, b) {
      checkPage(12);
      r = r || 46;
      g = g || 117;
      b = b || 182;
      doc.setFillColor(r, g, b);
      doc.roundedRect(M, y, CW, 8, 2, 2, "F");
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(8.5);
      doc.setFont("helvetica", "bold");
      const clean = (title || "").replace(/[^\x00-\x7F]/g, "").trim().toUpperCase();
      doc.text(clean, M + 3, y + 5.5);
      y += 11;
    }
    function fieldBox(x, fx, w, h, label, value) {
      doc.setFillColor(242, 244, 247);
      doc.roundedRect(x, fx, w, h, 1.5, 1.5, "F");
      doc.setDrawColor(220, 225, 232);
      doc.setLineWidth(0.3);
      doc.roundedRect(x, fx, w, h, 1.5, 1.5, "S");
      doc.setTextColor(64, 107, 158);
      doc.setFontSize(6.5);
      doc.setFont("helvetica", "bold");
      doc.text((label || "").toUpperCase() + ":", x + 2, fx + 3.5);
      doc.setTextColor(26, 36, 51);
      doc.setFontSize(9);
      doc.setFont("helvetica", "normal");
      const txt = (value || "—").substring(0, Math.floor(w * 0.52));
      doc.text(txt, x + 2, fx + h - 3);
    }
    function badge(x, bx, txt, r, g, b) {
      const tw = doc.getStringUnitWidth(txt) * 7.5 / doc.internal.scaleFactor + 5;
      doc.setFillColor(r, g, b);
      doc.roundedRect(x, bx, tw, 5.5, 1.5, 1.5, "F");
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(7.5);
      doc.setFont("helvetica", "bold");
      doc.text(txt, x + tw / 2, bx + 3.8, {
        align: "center"
      });
      return tw;
    }

    // ── FONDO BLANCO ─────────────────────────────────────
    doc.setFillColor(255, 255, 255);
    doc.rect(0, 0, W, 297, "F");

    // ── ENCABEZADO ───────────────────────────────────────
    doc.setFillColor(26, 51, 97);
    doc.rect(0, 0, W, 38, "F");
    doc.setFillColor(22, 163, 74);
    doc.rect(0, 38, W, 2, "F");
    try {
      doc.addImage(LOGO_SRC, "JPEG", M, 4, 52, 22, undefined, "MEDIUM");
    } catch (e) {}
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(13);
    doc.setFont("helvetica", "bold");
    doc.text("HOJA DE VIDA Y MANTENIMIENTO", M + 56, 14);
    doc.text("DE MAQUINARIA Y EQUIPOS", M + 56, 21);
    doc.setFontSize(8);
    doc.setFont("helvetica", "normal");
    doc.setTextColor(150, 220, 160);
    doc.text("HOSPITALIDAD & SERVICIOS", M + 56, 28);
    doc.setTextColor(190, 210, 235);
    doc.setFontSize(7.5);
    doc.text("Fecha: " + new Date().toLocaleDateString("es-CO"), W - M, 12, {
      align: "right"
    });
    doc.text("Version: 01", W - M, 18, {
      align: "right"
    });
    doc.text("Codigo: HDME-" + machine.id.toUpperCase(), W - M, 24, {
      align: "right"
    });
    y = 45;

    // ── DATOS DE IDENTIFICACIÓN ──────────────────────────
    secBar("DATOS DE IDENTIFICACION DEL EQUIPO");
    const hw = CW / 4 - 2;
    const bh = 14;
    const r1 = [["Equipo", hdv.equipo || machine.name], ["Marca", hdv.marca], ["Modelo", hdv.modelo], ["Serial", hdv.serial]];
    const r2 = [["Fabricante", hdv.fabricante], ["Fecha Fabricacion", hdv.fechaFabricacion ? fmtDate(hdv.fechaFabricacion) : ""], ["Ubicacion", hdv.ubicacion], ["Codigo Interno", hdv.codigoInterno]];
    r1.forEach((p, i) => fieldBox(M + i * (hw + 2), y, hw, bh, p[0], p[1]));
    y += bh + 2;
    r2.forEach((p, i) => fieldBox(M + i * (hw + 2), y, hw, bh, p[0], p[1]));
    y += bh + 6;

    // ── USUARIO Y RESPONSABLE ────────────────────────────
    secBar("USUARIO DEL EQUIPO / RESPONSABLE DE MANTENIMIENTO");
    const half = CW / 2 - 2;
    const urows = [[["Usuario Nombre", hdv.usuarioNombre], ["Cargo", hdv.usuarioCargo]], [["Responsable Mantenimiento", hdv.respNombre], ["Cargo", hdv.respCargo]]];
    urows.forEach(row => {
      row.forEach((p, i) => fieldBox(M + i * (half + 4), y, half, 13, p[0], p[1]));
      y += 15;
    });
    y += 3;

    // ── DESCRIPCIÓN ──────────────────────────────────────
    if (hdv.descripcion) {
      checkPage(20);
      secBar("DESCRIPCION DE CARACTERISTICAS DEL EQUIPO");
      const ls = doc.splitTextToSize(hdv.descripcion || "", CW - 6);
      const bh2 = ls.length * 5.2 + 5;
      checkPage(bh2);
      doc.setFillColor(242, 244, 247);
      doc.roundedRect(M, y, CW, bh2, 1.5, 1.5, "F");
      doc.setDrawColor(220, 225, 232);
      doc.setLineWidth(0.3);
      doc.roundedRect(M, y, CW, bh2, 1.5, 1.5, "S");
      doc.setTextColor(26, 36, 51);
      doc.setFontSize(9);
      doc.setFont("helvetica", "normal");
      ls.forEach((l, i) => doc.text(l, M + 3, y + 5 + i * 5.2));
      y += bh2 + 5;
    }

    // ── ETIQUETAS TÉCNICAS ───────────────────────────────
    if (hdv.etiquetasTecnicas) {
      checkPage(16);
      secBar("ETIQUETAS TECNICAS");
      doc.setFillColor(242, 244, 247);
      doc.roundedRect(M, y, CW, 10, 1.5, 1.5, "F");
      doc.setTextColor(26, 36, 51);
      doc.setFontSize(9);
      doc.setFont("helvetica", "normal");

      const cols = Math.min(fotos.length, 4);

      fotos.slice(0, cols).forEach((img, i) => {

function UserAdmin({showToast}){
  const ADMIN_PASS="Hosser2026";
  const [unlocked,setUnlocked]=useState(false);
  const [passInput,setPassInput]=useState("");
  const [passError,setPassError]=useState(false);
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(false);
  const [newEmail,setNewEmail]=useState("");
  const [newPass,setNewPass]=useState("");
  const [newName,setNewName]=useState("");
  const [creating,setCreating]=useState(false);
  const [deleting,setDeleting]=useState(null);

  function tryUnlock(){
    if(passInput===ADMIN_PASS){
      setUnlocked(true);
      loadUsers();
    } else {
      setPassError(true);
      setTimeout(()=>setPassError(false),2000);
    }
  }

  function loadUsers(){
    setLoading(true);
    fbDb.ref("hosser_users").on("value",snap=>{
      const val=snap.val();
      if(val) setUsers(Object.entries(val).map(([uid,u])=>({uid,...u})));
      else setUsers([]);
      setLoading(false);
    });
  }

  async function createUser(){
    if(!newEmail||!newPass||!newName){showToast("⚠️ Completa todos los campos","error");return;}
    if(newPass.length<6){showToast("⚠️ La contraseña debe tener al menos 6 caracteres","error");return;}
    setCreating(true);
    try{
      // Crear usuario secundario sin cerrar sesión actual
      const secondary=firebase.initializeApp(firebase.app().options,"secondary_"+Date.now());
      const secAuth=secondary.auth();
      const cred=await secAuth.createUserWithEmailAndPassword(newEmail,newPass);
      const uid=cred.user.uid;
      await secAuth.signOut();
      await secondary.delete();
      // Guardar datos en DB
      await fbDb.ref("hosser_users/"+uid).set({
        name:newName,
        email:newEmail,
        createdAt:new Date().toISOString(),
      });
      setNewEmail("");setNewPass("");setNewName("");
      showToast("✅ Usuario \""+newName+"\" creado");
    }catch(e){
      showToast("❌ Error: "+e.message,"error");
    }
    setCreating(false);
  }

  const [changingPass,setChangingPass]=useState(null); // uid del usuario
  const [newPassVal,setNewPassVal]=useState("");

  async function changePassword(u){
    if(!newPassVal||newPassVal.length<6){
      showToast("⚠️ Mínimo 6 caracteres","error");return;
    }
    setDeleting(u.uid+"_pass");
    try{
      const apiKey="AIzaSyAbkEzkw2TPHZ_hmbo6mbSRIKAYDiVQcwQ";
      // Actualizar contraseña via REST API con el localId del usuario
      const res=await fetch(
        `https://identitytoolkit.googleapis.com/v1/accounts:update?key=${apiKey}`,
        {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            localId: u.uid,
            password: newPassVal,
            returnSecureToken: false
          })
        }
      );
      const data=await res.json();
      if(data.error){
        // Si falla con localId, intentar con el token del admin actual
        const token=await fbAuth.currentUser.getIdToken();
        const res2=await fetch(
          `https://identitytoolkit.googleapis.com/v1/accounts:update?key=${apiKey}`,
          {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({idToken:token,password:newPassVal,returnSecureToken:true})
          }
        );
        const data2=await res2.json();
        if(data2.error) throw new Error(data2.error.message);
      }
      // Registrar actualización en DB
      await fbDb.ref("hosser_users/"+u.uid+"/passUpdated").set(new Date().toISOString());
      setChangingPass(null);setNewPassVal("");
      showToast("✅ Contraseña cambiada para "+u.name);
    }catch(e){
      showToast("❌ "+e.message,"error");
    }
    setDeleting(null);
  }

  async function deleteUser(u){
    if(!window.confirm("¿Eliminar usuario \""+u.name+"\"?\n\nEsta acción no se puede deshacer.")) return;
    setDeleting(u.uid);
    try{
      await fbDb.ref("hosser_users/"+u.uid).remove();
      showToast("✅ Usuario \""+u.name+"\" eliminado.\nNota: elimina también en Firebase Console → Authentication.");
    }catch(e){
      showToast("❌ Error: "+e.message,"error");
    }
    setDeleting(null);
  }

  // Pantalla de contraseña
  if(!unlocked){
    return(
      <div className="fi" style={{maxWidth:400,margin:"0 auto",paddingTop:40}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:40,marginBottom:8}}>🔐</div>
          <div style={{fontSize:18,fontWeight:800,color:C.text}}>Panel de Administración</div>
          <div style={{fontSize:12,color:C.muted,marginTop:4}}>Ingresa la contraseña para continuar</div>
        </div>
        <div style={{background:C.panel,borderRadius:16,padding:24,border:"1px solid "+(passError?"#DC2626":C.border)}}>
          <label style={lbl}>Contraseña de administrador</label>
          <input
            type="password"
            value={passInput}
            onChange={e=>setPassInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&tryUnlock()}
            placeholder="Contraseña..."
            style={{...inp,marginBottom:16,borderColor:passError?"#DC2626":C.border}}
            autoFocus
          />
          {passError&&<div style={{color:"#F87171",fontSize:12,marginBottom:12,textAlign:"center"}}>Contraseña incorrecta</div>}
          <button onClick={tryUnlock} style={{width:"100%",padding:"12px 0",borderRadius:10,border:"none",background:"linear-gradient(135deg,#2E75B6,#1a5fa8)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>
            🔓 Entrar
          </button>
        </div>
      </div>
    );
  }

  return(
    <div className="fi" style={{maxWidth:620,margin:"0 auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <div style={{fontSize:12,fontWeight:700,color:C.accent,textTransform:"uppercase",letterSpacing:1}}>👤 Gestión de Usuarios</div>
          <div style={{fontSize:10,color:C.muted,marginTop:2}}>Crea y elimina usuarios de la aplicación</div>
        </div>
        <button onClick={()=>setUnlocked(false)} style={{fontSize:11,padding:"5px 12px",borderRadius:7,border:"1px solid "+C.border,background:"transparent",color:C.muted,cursor:"pointer"}}>🔒 Bloquear</button>
      </div>

      {/* Crear usuario */}
      <div style={{background:C.panel,borderRadius:14,padding:16,border:"1px solid "+C.border,marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:700,color:C.blue,textTransform:"uppercase",letterSpacing:.5,marginBottom:12}}>➕ Crear nuevo usuario</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <div>
            <label style={lbl}>Nombre completo</label>
            <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Ej: Wilson Roa" style={inp}/>
          </div>
          <div>
            <label style={lbl}>Correo electrónico</label>
            <input type="email" value={newEmail} onChange={e=>setNewEmail(e.target.value)} placeholder="correo@hosser.com" style={inp}/>
          </div>
        </div>
        <div style={{marginBottom:12}}>
          <label style={lbl}>Contraseña temporal</label>
          <input type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} placeholder="Mínimo 6 caracteres" style={inp}/>
        </div>
        <button onClick={createUser} disabled={creating} style={{width:"100%",padding:"11px 0",borderRadius:10,border:"none",background:"linear-gradient(135deg,#16A34A,#15803d)",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
          {creating?"Creando...":"➕ Crear usuario"}
        </button>
      </div>

      {/* Lista usuarios */}
      <div style={{background:C.panel,borderRadius:14,padding:16,border:"1px solid "+C.border}}>
        <div style={{fontSize:11,fontWeight:700,color:C.blue,textTransform:"uppercase",letterSpacing:.5,marginBottom:12}}>
          Usuarios registrados
          <span style={{marginLeft:8,fontSize:10,color:C.muted,fontWeight:400,textTransform:"none"}}>{users.length} usuario{users.length!==1?"s":""}</span>
        </div>
        {loading&&<div style={{textAlign:"center",color:C.muted,padding:20}}>Cargando...</div>}
        {!loading&&users.length===0&&<div style={{textAlign:"center",color:C.muted,padding:20,fontSize:12}}>No hay usuarios registrados aún.</div>}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {users.map(u=>(
            <div key={u.uid} style={{background:C.header,borderRadius:10,padding:"10px 14px",border:"1px solid "+C.border}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:36,height:36,borderRadius:"50%",background:"#1E3050",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
                    {u.name?u.name[0].toUpperCase():"?"}
                  </div>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:C.text}}>{u.name}</div>
                    <div style={{fontSize:11,color:C.muted}}>{u.email}</div>
                    {u.createdAt&&<div style={{fontSize:9,color:C.accent,marginTop:2}}>Creado: {new Date(u.createdAt).toLocaleDateString("es-CO")}</div>}
                    {u.passUpdated&&<div style={{fontSize:9,color:C.green,marginTop:2}}>Contraseña actualizada: {new Date(u.passUpdated).toLocaleDateString("es-CO")}</div>}
                  </div>
                </div>
                <div style={{display:"flex",gap:6,flexShrink:0}}>
                  <button
                    onClick={()=>{setChangingPass(changingPass===u.uid?null:u.uid);setNewPassVal("");}}
                    style={{padding:"6px 10px",borderRadius:8,border:"1px solid #2E75B6",background:"transparent",color:"#60A5FA",cursor:"pointer",fontSize:11,fontWeight:700}}
                  >
                    🔑 Contraseña
                  </button>
                  <button
                    onClick={()=>deleteUser(u)}
                    disabled={deleting===u.uid}
                    style={{padding:"6px 10px",borderRadius:8,border:"none",background:"#3B1A1A",color:"#FCA5A5",cursor:"pointer",fontSize:11,fontWeight:700}}
                  >
                    {deleting===u.uid?"...":"🗑️"}
                  </button>
                </div>
              </div>
              {/* Panel cambiar contraseña */}
              {changingPass===u.uid&&(
                <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid "+C.border}}>
                  <label style={lbl}>Nueva contraseña para {u.name}</label>
                  <div style={{display:"flex",gap:8,marginTop:4}}>
                    <input
                      type="password"
                      value={newPassVal}
                      onChange={e=>setNewPassVal(e.target.value)}
                      placeholder="Mínimo 6 caracteres"
                      style={{...inp,flex:1}}
                    />
                    <button
                      onClick={()=>changePassword(u)}
                      disabled={deleting===u.uid+"_pass"}
                      style={{padding:"10px 14px",borderRadius:8,border:"none",background:"#2E75B6",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:12,whiteSpace:"nowrap"}}
                    >
                      {deleting===u.uid+"_pass"?"...":"💾 Guardar"}
                    </button>
                    <button
                      onClick={()=>{setChangingPass(null);setNewPassVal("");}}
                      style={{padding:"10px 12px",borderRadius:8,border:"1px solid "+C.border,background:"transparent",color:C.muted,cursor:"pointer",fontSize:12}}
                    >
                      ✕
                    </button>
                  </div>
                  <div style={{fontSize:10,color:C.muted,marginTop:6,fontStyle:"italic"}}>
                    💡 La nueva contraseña se aplicará la próxima vez que el usuario inicie sesión.
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
        <div style={{marginTop:12,fontSize:10,color:C.muted,fontStyle:"italic"}}>
          💡 Nota: al eliminar un usuario aquí se borra de la base de datos. Para eliminarlo completamente de Firebase Authentication, ve a la consola de Firebase.
        </div>
      </div>
    </div>
  );
}
